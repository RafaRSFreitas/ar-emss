<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AR Maintenance Prototype</title>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module" src="/static/ar.js"></script>


  <style>
html,
body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
}

body {
  position: fixed;
  font-family: Arial, sans-serif;
  background: #111;
  color: white;
}

#ui {
  position: fixed;
  top: 10px;
  left: 10px;
  z-index: 9999;

  background: rgba(0, 0, 0, 0.85); /* black, 85% visible */
  color: white;

  padding: 16px;
  border-radius: 12px;

  max-height: 90vh;
  overflow-y: auto;
}

    h3, h4 {
      margin-top: 0;
    }

    button {
      width: 100%;
      margin-top: 8px;
      padding: 10px;
      cursor: pointer;
      border: none;
      border-radius: 6px;
      font-size: 14px;
    }

    input,
    select {
      width: 100%;
      margin-top: 8px;
      padding: 8px;
      box-sizing: border-box;
      border-radius: 6px;
      border: none;
      font-size: 14px;
    }

    #faultInfo {
      margin-top: 12px;
      font-size: 14px;
      line-height: 1.5;
    }

    #msg {
      margin-top: 10px;
      font-size: 13px;
      color: #00ffcc;
      white-space: pre-wrap;
    }

    hr {
      margin: 20px 0;
      border: 0;
      border-top: 1px solid rgba(255,255,255,0.2);

    #scanToolBtn {
      margin-bottom: 12px;
    }


    #toolInfo {
      margin-top: 12px;
      font-size: 14px;
      margin-bottom: 12px;
    }
    }
  </style>
</head>

<body>
  <div id="ui">
    <h3>Maintenance AR Prototype</h3>

    <button id="closeFaultBtn" disabled>Mark Fault Closed</button>

    <div id="faultInfo">
      No fault selected.
    </div>

    <hr>

    <h4>Add New Fault</h4>

    <input
      type="text"
      id="title"
      placeholder="Fault title"
    >

    <input
      type="text"
      id="location"
      placeholder="Location"
    >

    <select id="severity">
      <option value="1">Low Severity</option>
      <option value="2">Medium Severity</option>
      <option value="3">High Severity</option>
    </select>

    <button id="addBtn">Add Fault</button>

    <div id="msg"></div>
    <hr>
    <h4>Tool Check</h4>
    <button id="scanToolBtn">Simulate Tool Scan</button>

    <div style="margin-top: 12px;" id="toolInfo">
    Tools scanned: 0 / 3
    </div>
    <ul id="toolList">
      <li>Spanner: missing</li>
      <li>Screwdriver: missing</li>
      <li>Voltage tester: missing</li>
    </ul>
  </div>


</body>
</html>
