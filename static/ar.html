<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AR Maintenance Prototype</title>

  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
    }

    #ui {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 10;
      background: rgba(0, 0, 0, 0.8);
      padding: 20px;
      border-radius: 12px;
      width: 300px;
    }

    h3, h4 {
      margin-top: 0;
    }

    button {
      width: 100%;
      margin-top: 8px;
      padding: 10px;
      cursor: pointer;
      border: none;
      border-radius: 6px;
      font-size: 14px;
    }

    input,
    select {
      width: 100%;
      margin-top: 8px;
      padding: 8px;
      box-sizing: border-box;
      border-radius: 6px;
      border: none;
      font-size: 14px;
    }

    #faultInfo {
      margin-top: 12px;
      font-size: 14px;
      line-height: 1.5;
    }

    #msg {
      margin-top: 10px;
      font-size: 13px;
      color: #00ffcc;
      white-space: pre-wrap;
    }

    hr {
      margin: 20px 0;
      border: 0;
      border-top: 1px solid rgba(255,255,255,0.2);
    }
  </style>
</head>

<body>
  <div id="ui">
    <h3>Maintenance AR Prototype</h3>

    <button id="scanFaultBtn">Simulate Fault Marker Scan</button>
    <button id="closeFaultBtn" disabled>Mark Fault Closed</button>

    <div id="faultInfo">
      No fault selected.
    </div>

    <hr>

    <h4>Add New Fault</h4>

    <input
      type="text"
      id="title"
      placeholder="Fault title"
    >

    <input
      type="text"
      id="location"
      placeholder="Location"
    >

    <select id="severity">
      <option value="low">Low Severity</option>
      <option value="medium">Medium Severity</option>
      <option value="high">High Severity</option>
    </select>

    <button id="addBtn">Add Fault</button>

    <div id="msg"></div>
  </div>

  <script src="/static/ar.js"></script>
</body>
</html>
